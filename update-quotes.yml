name: Atualizar Cotacoes

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quotes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance requests beautifulsoup4 lxml

      - name: Generate quotes.json
        run: python scripts/update_quotes.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/quotes.json
          if git diff --cached --quiet; then
            echo "No data changes"
            exit 0
          fi
          git commit -m "Atualiza quotes.json automaticamente"
          git push
